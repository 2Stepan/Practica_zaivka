<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <form action="/request_get/" method="get">
        <label for="request_item_id">Введите ID:</label>
        <input type="number" id="request_item_id" name="request_item_id" value="{{ request_item_id|default:'' }}" required>
        <button type="submit">Найти</button>
    </form>

    {% if request_item %}
        <h2>Результат поиска</h2>
        <h1>{{ request_item.service }}</h1>
        <p><strong>Клиент:</strong> {{ request_item.client_name }}</p>
        <p><strong>Дата создания:</strong> {{ request_item.date_created }}</p>
        <p><strong>Статус:</strong> {{ request_item.status }}</p>
    {% endif %}
</body>
</html>
