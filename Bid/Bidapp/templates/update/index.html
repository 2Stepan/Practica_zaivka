<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование заявки #{{ request.id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-warning">
                        <h3 class="mb-0">✏️ Редактирование заявки #{{ request.id }}</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="service" class="form-label">Услуга</label>
                                <input type="text" class="form-control" id="service" name="service" value="{{ request.service }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Описание</label>
                                <textarea class="form-control" id="description" name="description" rows="4">{{ request.description }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label for="status" class="form-label">Статус</label>
                                <select class="form-select" name="status" id="status">
                                    <option value="new" {% if request.status == 'new' %}selected{% endif %}>Новая</option>
                                    <option value="in_progress" {% if request.status == 'in_progress' %}selected{% endif %}>В работе</option>
                                    <option value="done" {% if request.status == 'done' %}selected{% endif %}>Завершена</option>
                                    <option value="canceled" {% if request.status == 'canceled' %}selected{% endif %}>Отменена</option>
                                </select>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-warning">💾 Сохранить изменения</button>
                                <a href="{% url 'view_requests' %}" class="btn btn-secondary">← Назад к списку</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
